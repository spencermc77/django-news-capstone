{% extends 'news/base.html' %}

{% block content %}
<h2>Delete Newsletter</h2>

<p>Are you sure you want to delete this newsletter?</p>

<p><strong>{{ newsletter.title }}</strong></p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete Newsletter</button>
</form>

<p>
    <a href="/newsletters/">Cancel</a>
</p>
{% endblock %}
