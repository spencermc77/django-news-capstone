{% extends 'news/base.html' %}

{% block content %}
<h2>Pending Articles</h2>

{% if articles %}
    {% for article in articles %}
        <hr>

        <h3>{{ article.title }}</h3>

        <p>
            <strong>Author:</strong>
            {{ article.author.username }}
        </p>

        <p>
            {{ article.content }}
        </p>

        <form method="post" action="/articles/{{ article.id }}/approve/">
            {% csrf_token %}
            <button type="submit">
                Approve Article
            </button>
        </form>
    {% endfor %}
{% else %}
    <p>No pending articles.</p>
{% endif %}

{% endblock %}
