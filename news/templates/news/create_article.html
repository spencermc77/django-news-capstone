{% extends 'news/base.html' %}

{% block content %}
<h2>Create Article</h2>

{% if user.is_authenticated %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Submit Article</button>
    </form>
{% else %}
    <p>You must be logged in to create an article.</p>
    <p><a href="/admin/login/">Log in here</a></p>
{% endif %}

{% endblock %}
